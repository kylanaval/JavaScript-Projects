<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project9_countdown_slideshow</title>
    <script src="JS/main.js" defer></script>
    <link rel="stylesheet" type="text/css" href="CSS/main.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
</head>
<body>
<!-- Countdown Timer Section -->
    <p>How many seconds would you like to set your alarm for?</p>
    <input id="seconds" value="" />
    <button onclick="countdown()">Click here</button>
    <p id="timer"></p>
   
<!-- Slideshow Section -->
   <h2>Automatic Slideshow</h2>
<p>Change image every 2 seconds:</p>

<div class="slideshow-container">

<div class="mySlides fade">
  <div class="numbertext">1 / 3</div>
  <img src="./IMG/car1.jpg" style="width:100%">
  <div class="text">1965 Shelby Cobra 427</div>
</div>

<div class="mySlides fade">
  <div class="numbertext">2 / 3</div>
  <img src="./IMG/car2.jpg" style="width:100%">
  <div class="text">1964 MG MGB Roadster</div>
</div>

<div class="mySlides fade">
  <div class="numbertext">3 / 3</div>
  <img src="./IMG/car3.jpg" style="width:100%">
  <div class="text">1972 Chevrolet Chevelle SS Convertible</div>
</div>

</div>
<br>

<div style="text-align:center">
  <span class="dot"></span> 
  <span class="dot"></span> 
  <span class="dot"></span> 
</div>



</body>
</html>
