<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Switch Statement Assignment</title>
    <script src="JavaScript/JavaScript_2.js" defer></script>
    <link rel="stylesheet" type="text/css" href="JavaScript/CSS/CSS_1.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <h2>Style an HTML Form with CSS with Javascript validation</h2>

   <form name="myForm" action="/action_page.php" onsubmit="return validateForm()" method="post">
  <label for="fname">First Name</label>
  <input type="text" id="fname" name="fname" placeholder="Your name..">

  <label for="lname">Last Name</label>
  <input type="text" id="lname" name="lname" placeholder="Your last name..">

  <label for="country">Country</label>
  <select id="country" name="country">
    <option value="australia">Australia</option>
    <option value="canada">Canada</option>
    <option value="usa">USA</option>
  </select>
  
  <input type="submit" value="Submit">
</form>
    <p>If you click the "Submit" button, the form-data will be sent to a page called "/action_page.php".</p>
</body>
</html>
